<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday My Love ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="startMusicOnce()">

<!-- Tap Screen Overlay -->
<div class="overlay" id="tapMessage">
    💖 Tap Anywhere My Love 💖
</div>

<!-- Falling Hearts -->
<div class="hearts"></div>

<div class="container">
    <h1>Happy Birthday My Love ❤️🎂</h1>

    <div class="typing-box">
        <p id="typedText"></p>
    </div>
</div>

<!-- IMPORTANT: path updated -->
<audio id="music" autoplay loop>
    <source src="og/song.mp3" type="audio/mp3">
</audio>

<script>

let started = false;

function startMusicOnce() {
    if (!started) {
        const music = document.getElementById("music");
        music.play();
        document.getElementById("tapMessage").style.display = "none";
        started = true;
    }
}

// Typing Effect
const message = `Happy Birthday majha lekru ❤️🎂

Tuzya aalyapasun mazi life kharach change zali aahe 💕
Tu fakt mazi girlfriend nahi, tu mazi happiness, maza peace ani mazi strength ahes 🥺💖

Tuzya smile ne maza full day bright hoto ☀️😍
Ani tu radata na, te mala ajibat nahi avadt 😤❤️
Mi nehmi tuzyasobat asnar — good days madhe pan ani bad days madhe pan 🤝💞

Devakade ekach prayer aahe 🙏
Tu nehmich happy raha, successful raha ani mazyasobat raha 💍✨

Tu majhi lucky charm ahes 🍀💖
Ani future madhe pan mala fakt tuzya sobat life spend karaychi aahe 😘🌹

Enjoy your special day baby 🎉🎁
Aaj full queen mode madhe raha 👑🔥

Love you forever majhi beautiful Baala 😘❤️✨`;

let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("typedText").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    }
}
window.onload = typeWriter;


// Falling Hearts
const heartsContainer = document.querySelector(".hearts");

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";
    heart.style.animationDuration = Math.random() * 3 + 4 + "s";
    heartsContainer.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 7000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
