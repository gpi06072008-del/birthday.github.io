<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay" onclick="startMusic()">
💖 Tap Anywhere My Love 💖
</div>

<div class="hearts"></div>

<div class="container">
<h1>Happy Birthday My Love ❤️🎂</h1>
<div class="typing-box">
<p id="typedText"></p>
</div>
</div>

<audio id="music" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<script>

const message = `Happy Birthday majha lekru ❤️🎂

Tuzya aalyapasun mazi life kharach change zali aahe 💕
Tu fakt mazi girlfriend nahi, tu mazi happiness, maza peace ani mazi strength ahes 🥺💖

Love you forever majhi beautiful Baala 😘❤️✨`;

let i = 0;
function typeWriter() {
if (i < message.length) {
document.getElementById("typedText").innerHTML += message.charAt(i);
i++;
setTimeout(typeWriter, 35);
}
}
typeWriter();

function startMusic() {
document.getElementById("music").play();
document.querySelector(".overlay").style.display = "none";
}

const heartsContainer = document.querySelector(".hearts");
function createHeart() {
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "❤";
heart.style.left = Math.random() * 100 + "vw";
heart.style.fontSize = Math.random() * 20 + 15 + "px";
heart.style.animationDuration = Math.random() * 3 + 4 + "s";
heartsContainer.appendChild(heart);
setTimeout(() => heart.remove(), 7000);
}
setInterval(createHeart, 300);

</script>

</body>
</html>
